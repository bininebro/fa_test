<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Browser Breakout</title>
    
<script>
(function () {
    if (sessionStorage.getItem("openedExternal")) {
        return;
    }

    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var currentUrl = window.location.href;

    var isFacebook = ua.indexOf("FBAN") > -1 || ua.indexOf("FBAV") > -1;
    var isInstagram = ua.indexOf("Instagram") > -1;

    if (isFacebook || isInstagram) {

        sessionStorage.setItem("openedExternal", "1");

        if (/Android/i.test(ua)) {
            var cleanUrl = currentUrl.replace(/^https?:\/\//, '');
            var encodedFallback = encodeURIComponent(currentUrl);

            window.location.href =
                "intent://" + cleanUrl +
                "#Intent;" +
                "scheme=https;" +
                "package=com.android.chrome;" +
                "S.browser_fallback_url=" + encodedFallback + ";" +
                "end";
        }
    }
})();
</script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; color: #333; }
        .box { border: 2px dashed #007bff; padding: 20px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🎉 SUCCESS!</h2>
        <p>If you see this page inside <b>Chrome or Safari</b>, the bypass worked!</p>
        <p>Your Google Analytics cookies will now track accurately.</p>
    </div>

</body>
</html>
